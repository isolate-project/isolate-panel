name: Tests

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Install CGO dependencies
        run: sudo apt-get install -y gcc libc6-dev

      - name: Install dependencies
        run: |
          cd backend
          go mod download

      - name: Run tests
        run: |
          cd backend
          go test ./... -v -coverprofile=coverage.out -covermode=atomic -timeout=120s

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./backend/coverage.out
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: TypeScript check
        run: |
          cd frontend
          npm run typecheck

      - name: ESLint check
        run: |
          cd frontend
          npm run lint

      - name: Run component tests
        run: |
          cd frontend
          npm run test -- --coverage --reporter=verbose

      - name: Install Playwright browsers
        run: |
          cd frontend
          npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: |
          cd frontend
          npm run test:e2e

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./frontend/coverage/lcov.info
          flags: frontend
          name: frontend-coverage
          fail_ci_if_error: false

      - name: Upload E2E report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

  cli-test:
    name: CLI Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: cli/go.sum

      - name: Install CGO dependencies
        run: sudo apt-get install -y gcc libc6-dev

      - name: Install dependencies
        run: |
          cd cli
          go mod download

      - name: Run unit tests
        run: |
          cd cli
          go test ./cmd/... -v -coverprofile=coverage.out -timeout=60s

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./cli/coverage.out
          flags: cli
          name: cli-coverage
          fail_ci_if_error: false

  lint:
    name: Linting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install CGO dependencies
        run: sudo apt-get install -y gcc libc6-dev

      - name: Run golangci-lint (backend)
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: backend
          args: --timeout=5m

      - name: Run golangci-lint (CLI)
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: cli
          args: --timeout=5m

      - name: Lint frontend
        run: |
          cd frontend
          npm ci
          npm run lint

  e2e-live:
    name: E2E Live Tests (Real Backend)
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Install Playwright browsers
        run: |
          cd frontend
          npx playwright install chromium --with-deps

      - name: Build and start test backend
        run: |
          docker compose -f docker/docker-compose.test.yml up -d --build
        timeout-minutes: 10

      - name: Wait for backend health
        run: |
          echo "Waiting for backend to become healthy..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080/health | grep -q '"status":"healthy"'; then
              echo "Backend is healthy!"
              exit 0
            fi
            echo "  Attempt $i/60 - waiting 3s..."
            sleep 3
          done
          echo "Backend did not become healthy in time"
          docker compose -f docker/docker-compose.test.yml logs
          exit 1
        timeout-minutes: 5

      - name: Run live E2E tests
        run: |
          cd frontend
          npm run test:e2e:live
        timeout-minutes: 10

      - name: Stop test backend
        if: always()
        run: |
          docker compose -f docker/docker-compose.test.yml down -v --remove-orphans

      - name: Upload live E2E report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-live
          path: frontend/playwright-report-live/
          retention-days: 30

  build-verification:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test, cli-test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install CGO dependencies
        run: sudo apt-get install -y gcc libc6-dev

      - name: Build backend
        run: |
          cd backend
          go build -o bin/server ./cmd/server/main.go

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Build CLI
        run: |
          cd cli
          go build -o bin/isolate ./

      - name: Build Docker image
        run: |
          docker build -f docker/Dockerfile -t isolate-panel:ci-test .
