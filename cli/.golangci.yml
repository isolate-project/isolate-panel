version: "2"
run:
  tests: true
linters:
  default: none
  enable:
    - gosec
    - govet
    - ineffassign
    - misspell
    - prealloc
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - gosec
        path: _test\.go
        text: G104
      - linters:
          - gosec
        path: _test\.go
        text: G101
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
