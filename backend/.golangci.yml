run:
  tests: true
  timeout: 5m

linters:
  disable-all: true
  enable:
    - govet        # Обнаруживает подозрительные конструкции
    - ineffassign  # Бесполезные присваивания
    - misspell     # Опечатки в комментариях
    - gosec        # Безопасность (G*)
    - prealloc     # Подсказки по pre-allocation срезов

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    # Разрешить G104 (unhandled errors) в тестах
    - path: _test\.go
      linters:
        - gosec
      text: "G104"
    # Разрешить G101 (hardcoded credentials) в тестах
    - path: _test\.go
      linters:
        - gosec
      text: "G101"
