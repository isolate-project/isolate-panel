app:
  name: "Isolate Panel"
  env: "development"
  port: 8080
  host: "127.0.0.1"

database:
  path: "/app/data/isolate-panel.db"
  max_open_conns: 10
  max_idle_conns: 5

jwt:
  secret: "change-this-in-production-use-env-var"
  access_token_ttl: 900  # 15 minutes
  refresh_token_ttl: 604800  # 7 days

logging:
  level: "debug"
  format: "json"

security:
  argon2:
    time: 1
    memory: 65536  # 64 MB
    threads: 4
    key_length: 32
    salt_length: 16
