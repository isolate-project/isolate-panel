app:
  name: "Isolate Panel"
  env: "development"
  port: 8080
  host: "127.0.0.1"

database:
  path: "./data/isolate-panel.db"
  max_open_conns: 10
  max_idle_conns: 5

jwt:
  secret: "change-this-in-production-use-env-var"
  access_token_ttl: 900  # 15 minutes
  refresh_token_ttl: 604800  # 7 days

logging:
  level: "info"
  format: "console"  # "json" or "console"
  output: "both"     # "stdout", "file", or "both"
  file_path: "./logs/isolate-panel.log"
  max_size: 100      # megabytes
  max_backups: 3     # number of backups
  max_age: 28        # days
  compress: true     # compress rotated files

security:
  argon2:
    time: 1
    memory: 65536  # 64 MB
    threads: 4
    key_length: 32
    salt_length: 16

cores:
  config_dir: "./data/cores"
  supervisor_url: "http://localhost:9001/RPC2"
