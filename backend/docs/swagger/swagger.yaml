basePath: /api
definitions:
  github_com_isolate-project_isolate-panel_internal_models.BackupType:
    enum:
    - full
    - manual
    - scheduled
    type: string
    x-enum-varnames:
    - BackupTypeFull
    - BackupTypeManual
    - BackupTypeScheduled
  github_com_isolate-project_isolate-panel_internal_models.Core:
    properties:
      config_path:
        type: string
      created_at:
        type: string
      id:
        type: integer
      is_enabled:
        type: boolean
      is_running:
        type: boolean
      last_error:
        type: string
      log_path:
        type: string
      name:
        description: singbox, xray, mihomo
        type: string
      pid:
        type: integer
      restart_count:
        type: integer
      updated_at:
        type: string
      uptime_seconds:
        description: Statistics
        type: integer
      version:
        type: string
    type: object
  github_com_isolate-project_isolate-panel_internal_models.GeoRule:
    properties:
      action:
        description: '"proxy", "direct", "block", "warp"'
        type: string
      code:
        description: country code (US, CN) or category (google, netflix)
        type: string
      core_id:
        type: integer
      created_at:
        type: string
      description:
        type: string
      id:
        type: integer
      is_enabled:
        type: boolean
      priority:
        description: 1-100, higher = more priority
        type: integer
      type:
        description: '"geoip" or "geosite"'
        type: string
      updated_at:
        type: string
    type: object
  github_com_isolate-project_isolate-panel_internal_models.Inbound:
    properties:
      config_json:
        type: string
      core:
        allOf:
        - $ref: '#/definitions/github_com_isolate-project_isolate-panel_internal_models.Core'
        description: Relations
      core_id:
        type: integer
      created_at:
        description: Metadata
        type: string
      id:
        type: integer
      is_enabled:
        description: Status
        type: boolean
      listen_address:
        type: string
      name:
        type: string
      port:
        type: integer
      protocol:
        type: string
      reality_config_json:
        type: string
      reality_enabled:
        type: boolean
      tls_cert_id:
        type: integer
      tls_enabled:
        description: TLS/REALITY
        type: boolean
      updated_at:
        type: string
    type: object
  github_com_isolate-project_isolate-panel_internal_models.NotificationSettings:
    properties:
      notify_cert_renewed:
        type: boolean
      notify_core_error:
        type: boolean
      notify_expiry_warning:
        type: boolean
      notify_failed_login:
        type: boolean
      notify_quota_exceeded:
        description: Event toggles
        type: boolean
      notify_user_created:
        type: boolean
      notify_user_deleted:
        type: boolean
      telegram_bot_token:
        type: string
      telegram_chat_id:
        type: string
      telegram_enabled:
        type: boolean
      webhook_enabled:
        type: boolean
      webhook_secret:
        type: string
      webhook_url:
        type: string
    type: object
  github_com_isolate-project_isolate-panel_internal_models.Outbound:
    properties:
      config_json:
        type: string
      core:
        allOf:
        - $ref: '#/definitions/github_com_isolate-project_isolate-panel_internal_models.Core'
        description: Relations
      core_id:
        type: integer
      created_at:
        type: string
      id:
        type: integer
      is_enabled:
        type: boolean
      name:
        type: string
      priority:
        type: integer
      protocol:
        type: string
      updated_at:
        type: string
    type: object
  github_com_isolate-project_isolate-panel_internal_models.WarpRoute:
    properties:
      core_id:
        type: integer
      created_at:
        type: string
      description:
        type: string
      id:
        type: integer
      is_enabled:
        type: boolean
      priority:
        description: 1-100, higher = more priority
        type: integer
      resource_type:
        description: '"domain", "ip", "cidr"'
        type: string
      resource_value:
        type: string
      updated_at:
        type: string
    type: object
  github_com_isolate-project_isolate-panel_internal_services.BackupRequest:
    properties:
      encryption_enabled:
        type: boolean
      include_certs:
        type: boolean
      include_cores:
        type: boolean
      include_geo:
        type: boolean
      include_warp:
        type: boolean
      type:
        $ref: '#/definitions/github_com_isolate-project_isolate-panel_internal_models.BackupType'
    type: object
  github_com_isolate-project_isolate-panel_internal_services.CreateUserRequest:
    properties:
      email:
        type: string
      expiry_days:
        type: integer
      inbound_ids:
        items:
          type: integer
        type: array
      password:
        minLength: 8
        type: string
      traffic_limit_bytes:
        type: integer
      username:
        maxLength: 50
        minLength: 3
        type: string
    required:
    - password
    - username
    type: object
  github_com_isolate-project_isolate-panel_internal_services.UpdateUserRequest:
    properties:
      email:
        type: string
      inbound_ids:
        items:
          type: integer
        type: array
      is_active:
        type: boolean
      password:
        minLength: 8
        type: string
      traffic_limit_bytes:
        type: integer
      username:
        maxLength: 50
        minLength: 3
        type: string
    type: object
  github_com_isolate-project_isolate-panel_internal_services.UserResponse:
    properties:
      created_at:
        type: string
      email:
        type: string
      expiry_date:
        type: string
      id:
        type: integer
      inbound_ids:
        items:
          type: integer
        type: array
      is_active:
        type: boolean
      is_online:
        type: boolean
      password:
        type: string
      subscription_token:
        type: string
      token:
        type: string
      traffic_limit_bytes:
        type: integer
      traffic_used_bytes:
        type: integer
      username:
        type: string
      uuid:
        type: string
    type: object
  internal_api.AdminInfo:
    properties:
      email:
        type: string
      id:
        type: integer
      is_super_admin:
        type: boolean
      username:
        type: string
    type: object
  internal_api.CertificateRequest:
    properties:
      domain:
        type: string
      email:
        description: Optional, uses service default if not provided
        type: string
      is_wildcard:
        type: boolean
    required:
    - domain
    type: object
  internal_api.LoginRequest:
    properties:
      password:
        type: string
      totp_code:
        description: required when TOTP is enabled
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  internal_api.LoginResponse:
    properties:
      access_token:
        type: string
      admin:
        $ref: '#/definitions/internal_api.AdminInfo'
      expires_in:
        type: integer
      must_change_password:
        description: Whether the user must change their password before accessing other endpoints
        type: boolean
      refresh_token:
        type: string
    type: object
  internal_api.RefreshRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  internal_api.UploadCertificateRequest:
    properties:
      certificate:
        type: string
      domain:
        type: string
      is_wildcard:
        type: boolean
      issuer:
        type: string
      private_key:
        type: string
    required:
    - certificate
    - domain
    - private_key
    type: object
host: localhost:8080
info:
  contact:
    name: Isolate Panel
    url: https://github.com/isolate-project/isolate-panel/issues
  description: Lightweight proxy core management panel for Xray, Sing-box, and Mihomo.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  title: Isolate Panel API
  version: 1.0.0
paths:
  /audit-logs:
    get:
      description: Returns paginated audit log entries. Super-admin only.
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 50
        description: Items per page
        in: query
        name: limit
        type: integer
      - description: Filter by action (e.g. user.delete)
        in: query
        name: action
        type: string
      - description: Filter by admin ID
        in: query
        name: admin_id
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List audit logs
      tags:
      - audit
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate with username and password. If TOTP is enabled, provide
        totp_code as well. Returns requires_totp:true when TOTP code is missing.
      parameters:
      - description: Login credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_api.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api.LoginResponse'
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      summary: Login
      tags:
      - auth
  /auth/logout:
    post:
      consumes:
      - application/json
      description: Revoke the current refresh token
      parameters:
      - description: Refresh token to revoke
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_api.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Logout
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Exchange a valid refresh token for a new access token
      parameters:
      - description: Refresh token
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_api.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      summary: Refresh access token
      tags:
      - auth
  /auth/totp/disable:
    post:
      consumes:
      - application/json
      description: Disable 2FA after verifying the admin password
      parameters:
      - description: 'Admin password: {password}'
        in: body
        name: body
        required: true
        schema:
          additionalProperties:
            type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Disable TOTP
      tags:
      - auth
  /auth/totp/setup:
    post:
      description: Generate a new TOTP secret and provisioning URI. Call TOTPVerify
        after to activate.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Setup TOTP
      tags:
      - auth
  /auth/totp/status:
    get:
      description: Check if TOTP 2FA is enabled for the current admin account
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: TOTP status
      tags:
      - auth
  /auth/totp/verify:
    post:
      consumes:
      - application/json
      description: Confirm the TOTP code from the authenticator app and activate 2FA
      parameters:
      - description: 'TOTP code: {code}'
        in: body
        name: body
        required: true
        schema:
          additionalProperties:
            type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Verify and enable TOTP
      tags:
      - auth
  /backups:
    get:
      description: Returns all available backup files with metadata
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List backups
      tags:
      - backups
  /backups/{id}:
    delete:
      description: Delete a backup file and its record
      parameters:
      - description: Backup ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Delete backup
      tags:
      - backups
    get:
      description: Returns metadata for a specific backup
      parameters:
      - description: Backup ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get backup
      tags:
      - backups
  /backups/{id}/download:
    get:
      description: Download a backup file as a binary stream
      parameters:
      - description: Backup ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/octet-stream
      responses:
        "200":
          description: OK
          schema:
            type: file
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Download backup
      tags:
      - backups
  /backups/{id}/restore:
    post:
      consumes:
      - application/json
      description: Restore database and configurations from a backup file
      parameters:
      - description: Backup ID
        in: path
        name: id
        required: true
        type: integer
      - description: '{force: false}'
        in: body
        name: body
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Restore backup
      tags:
      - backups
  /backups/create:
    post:
      consumes:
      - application/json
      description: Start a new AES-256-GCM encrypted backup of the database and core
        configurations
      parameters:
      - description: Backup options
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_isolate-project_isolate-panel_internal_services.BackupRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Create backup
      tags:
      - backups
  /backups/schedule:
    get:
      description: Returns current backup cron schedule and next scheduled run time
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get backup schedule
      tags:
      - backups
    post:
      consumes:
      - application/json
      description: Set a cron expression for automatic backups (empty string to disable)
      parameters:
      - description: '{cron: ''0 2 * * *''}'
        in: body
        name: body
        required: true
        schema:
          additionalProperties:
            type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Set backup schedule
      tags:
      - backups
  /certificates:
    get:
      description: Returns all SSL/TLS certificates with current status
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List certificates
      tags:
      - certificates
    post:
      consumes:
      - application/json
      description: Request a new SSL/TLS certificate via Let's Encrypt ACME
      parameters:
      - description: Domain and options
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_api.CertificateRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Request certificate
      tags:
      - certificates
  /certificates/{id}:
    delete:
      description: Delete a certificate record and its files
      parameters:
      - description: Certificate ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Delete certificate
      tags:
      - certificates
    get:
      description: Returns a single certificate by ID with current status
      parameters:
      - description: Certificate ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get certificate
      tags:
      - certificates
  /certificates/{id}/renew:
    post:
      description: Force-renew a certificate via ACME (even if not yet expired)
      parameters:
      - description: Certificate ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Renew certificate
      tags:
      - certificates
  /certificates/{id}/revoke:
    post:
      description: Revoke a certificate via ACME and mark it as revoked
      parameters:
      - description: Certificate ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Revoke certificate
      tags:
      - certificates
  /certificates/dropdown:
    get:
      description: Returns active/expiring certificates formatted for UI dropdown
        selectors
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Certificates dropdown
      tags:
      - certificates
  /certificates/upload:
    post:
      consumes:
      - application/json
      description: Upload a manually obtained certificate in PEM format
      parameters:
      - description: Certificate and private key in PEM format
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_api.UploadCertificateRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Upload certificate
      tags:
      - certificates
  /cores:
    get:
      description: Returns all installed proxy cores with their running status
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List cores
      tags:
      - cores
  /cores/{name}:
    get:
      description: Returns status and info for a specific proxy core
      parameters:
      - description: Core name (xray, sing-box, mihomo)
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get core
      tags:
      - cores
  /cores/{name}/restart:
    post:
      description: Restart a proxy core (stop + start)
      parameters:
      - description: Core name
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Restart core
      tags:
      - cores
  /cores/{name}/start:
    post:
      description: Start a proxy core via Supervisord
      parameters:
      - description: Core name
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Start core
      tags:
      - cores
  /cores/{name}/status:
    get:
      description: Returns detailed runtime status of a proxy core (PID, uptime, restarts)
      parameters:
      - description: Core name
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Core status
      tags:
      - cores
  /cores/{name}/stop:
    post:
      description: Stop a running proxy core via Supervisord
      parameters:
      - description: Core name
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Stop core
      tags:
      - cores
  /geo/categories:
    get:
      description: Returns all available GeoSite category codes (cn, google, netflix,
        etc.)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List GeoSite categories
      tags:
      - geo
  /geo/countries:
    get:
      description: Returns all available country codes for use in GeoIP routing rules
      produces:
      - application/json
