      description: Returns paginated list of all proxy users
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 20
        description: Items per page
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List users
      tags:
      - users
    post:
      consumes:
      - application/json
      description: Create a new proxy user
      parameters:
      - description: User data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_isolate-project_isolate-panel_internal_services.CreateUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_isolate-project_isolate-panel_internal_services.UserResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Create user
      tags:
      - users
  /users/{id}:
    delete:
      description: Permanently delete a user and all associated data
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Delete user
      tags:
      - users
    get:
      description: Returns a single user by ID
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_isolate-project_isolate-panel_internal_services.UserResponse'
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get user
      tags:
      - users
    put:
      consumes:
      - application/json
      description: Update user fields (all fields optional)
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      - description: Fields to update
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_isolate-project_isolate-panel_internal_services.UpdateUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_isolate-project_isolate-panel_internal_services.UserResponse'
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Update user
      tags:
      - users
  /users/{id}/inbounds:
    get:
      description: Returns all inbounds assigned to a specific user
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get user inbounds
      tags:
      - users
  /users/{id}/regenerate:
    post:
      description: Generate a new UUID, password, and subscription token for the user
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Regenerate credentials
      tags:
      - users
  /users/{user_id}/subscription/regenerate:
    post:
      description: Generate a new subscription token for a user (old links become
        invalid)
      parameters:
      - description: User ID
        in: path
        name: user_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Regenerate subscription token
      tags:
      - subscriptions
  /users/{user_id}/subscription/stats:
    get:
      description: Returns subscription URL access history for a user (client IPs,
        user-agents, formats)
      parameters:
      - description: User ID
        in: path
        name: user_id
        required: true
        type: integer
      - default: 7
        description: Number of days to look back
        in: query
        name: days
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Subscription access stats
      tags:
      - subscriptions
  /warp/presets:
    get:
      description: Returns built-in WARP routing presets (bypass-cn, all-through-warp,
        etc.)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List WARP presets
      tags:
      - warp
  /warp/presets/{name}/apply:
    post:
      description: Apply a named WARP routing preset to a specific core
      parameters:
      - description: Preset name
        in: path
        name: name
        required: true
        type: string
      - description: Core ID
        in: query
        name: core_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Apply WARP preset
      tags:
      - warp
  /warp/register:
    post:
      description: Register a new Cloudflare WARP device and generate WireGuard config
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Register WARP device
      tags:
      - warp
  /warp/routes:
    get:
      description: Returns all WARP routing rules for a specific core
      parameters:
      - description: Core ID
        in: query
        name: core_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List WARP routes
      tags:
      - warp
    post:
      consumes:
      - application/json
      description: Create a new WARP routing rule (domain, IP, or CIDR)
      parameters:
      - description: Route configuration
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_isolate-project_isolate-panel_internal_models.WarpRoute'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Create WARP route
      tags:
      - warp
  /warp/routes/{id}:
    delete:
      parameters:
      - description: Route ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Delete WARP route
      tags:
      - warp
    put:
      consumes:
      - application/json
      description: Update an existing WARP routing rule
      parameters:
      - description: Route ID
        in: path
        name: id
        required: true
        type: integer
      - description: Fields to update
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_isolate-project_isolate-panel_internal_models.WarpRoute'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Update WARP route
      tags:
      - warp
  /warp/routes/{id}/toggle:
    post:
      parameters:
      - description: Route ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Toggle WARP route
      tags:
      - warp
  /warp/status:
    get:
      description: Returns current Cloudflare WARP connection status
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: WARP status
      tags:
      - warp
  /warp/sync:
    post:
      description: Regenerate core configs and reload to apply current WARP routes
      parameters:
      - description: Specific core ID to sync (omit to sync all)
        in: query
        name: core_id
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Sync WARP routes to cores
      tags:
      - warp
securityDefinitions:
  BearerAuth:
    description: 'JWT Bearer token. Format: "Bearer {token}"'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
