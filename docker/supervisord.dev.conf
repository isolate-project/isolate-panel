[unix_http_server]
file=/var/run/supervisor.sock
chmod=0700

[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
logfile_maxbytes=50MB
logfile_backups=3
pidfile=/var/run/supervisord.pid
loglevel=info
childlogdir=/var/log/supervisor

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[program:backend]
command=air -c /app/backend/.air.toml
directory=/app/backend
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisor/backend.err.log
stdout_logfile=/var/log/supervisor/backend.out.log
stdout_logfile_maxbytes=50MB
stdout_logfile_backups=3
stderr_logfile_maxbytes=10MB
stderr_logfile_backups=3
environment=APP_ENV="development",PORT="8080",DATABASE_PATH="/app/data/isolate-panel.db",LOG_LEVEL="debug",CGO_ENABLED="1"
priority=10

[program:frontend]
command=npx vite dev --host 0.0.0.0 --port 5173
directory=/app/frontend
autostart=true
autorestart=true
stderr_logfile=/var/log/supervisor/frontend.err.log
stdout_logfile=/var/log/supervisor/frontend.out.log
stdout_logfile_maxbytes=50MB
stdout_logfile_backups=3
stderr_logfile_maxbytes=10MB
stderr_logfile_backups=3
priority=10

[program:xray]
command=/usr/local/bin/xray -config /app/data/cores/xray/config.json
directory=/app/data/cores/xray
autostart=false
autorestart=true
stderr_logfile=/var/log/supervisor/xray.err.log
stdout_logfile=/var/log/supervisor/xray.out.log
stdout_logfile_maxbytes=50MB
stdout_logfile_backups=3
stderr_logfile_maxbytes=10MB
stderr_logfile_backups=3
priority=20
startsecs=5
startretries=3
stopwaitsecs=10

[program:mihomo]
command=/usr/local/bin/mihomo -d /app/data/cores/mihomo -f /app/data/cores/mihomo/config.yaml
directory=/app/data/cores/mihomo
autostart=false
autorestart=true
stderr_logfile=/var/log/supervisor/mihomo.err.log
stdout_logfile=/var/log/supervisor/mihomo.out.log
stdout_logfile_maxbytes=50MB
stdout_logfile_backups=3
stderr_logfile_maxbytes=10MB
stderr_logfile_backups=3
priority=20
startsecs=5
startretries=3
stopwaitsecs=10

[program:singbox]
command=/usr/local/bin/sing-box run -c /app/data/cores/singbox/config.json
directory=/app/data/cores/singbox
autostart=false
autorestart=true
stderr_logfile=/var/log/supervisor/singbox.err.log
stdout_logfile=/var/log/supervisor/singbox.out.log
stdout_logfile_maxbytes=50MB
stdout_logfile_backups=3
stderr_logfile_maxbytes=10MB
stderr_logfile_backups=3
priority=20
startsecs=5
startretries=3
stopwaitsecs=10
