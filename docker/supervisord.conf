[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
childlogdir=/var/log/supervisor

[unix_http_server]
file=/var/run/supervisor.sock
chmod=0700

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

# Isolate Panel Backend
[program:isolate-panel]
command=/app/backend/bin/server
directory=/app/backend
autostart=true
autorestart=true
stdout_logfile=/var/log/supervisor/isolate-panel.log
stderr_logfile=/var/log/supervisor/isolate-panel.err.log
environment=PORT="8080",DATABASE_PATH="/app/data/isolate-panel.db",APP_ENV="%(ENV_APP_ENV)s"

# Sing-box (Lazy Loading - autostart=false)
[program:singbox]
command=/usr/local/bin/sing-box run -c /app/data/cores/singbox/config.json
autostart=false
autorestart=true
stdout_logfile=/var/log/supervisor/singbox.log
stderr_logfile=/var/log/supervisor/singbox.err.log
startsecs=3
stopwaitsecs=10

# Xray (Lazy Loading - autostart=false)
[program:xray]
command=/usr/local/bin/xray run -c /app/data/cores/xray/config.json
autostart=false
autorestart=true
stdout_logfile=/var/log/supervisor/xray.log
stderr_logfile=/var/log/supervisor/xray.err.log
startsecs=3
stopwaitsecs=10

# Mihomo (Lazy Loading - autostart=false)
[program:mihomo]
command=/usr/local/bin/mihomo -f /app/data/cores/mihomo/config.yaml
autostart=false
autorestart=true
stdout_logfile=/var/log/supervisor/mihomo.log
stderr_logfile=/var/log/supervisor/mihomo.err.log
startsecs=3
stopwaitsecs=10
