; Note: All programs share the same process namespace in this container.
; For enhanced isolation, consider running each core as a separate Docker service.

[unix_http_server]
file=/var/run/supervisor.sock
chmod=0700

[inet_http_server]
port=127.0.0.1:9001

[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
logfile_maxbytes=50MB
logfile_backups=3
pidfile=/var/run/supervisord.pid
loglevel=info
childlogdir=/var/log/supervisor

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[program:isolate-panel]
command=/bin/sh -c "PORT=8080 CONFIG_PATH=/app/configs/config.yaml DATABASE_PATH=/app/data/isolate-panel.db LOG_LEVEL=info APP_ENV=production exec /usr/local/bin/isolate-panel"
directory=/app
user=isolate
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
stopwaitsecs=10
exitcodes=0,2
stderr_logfile=/var/log/isolate-panel/panel.err.log
stdout_logfile=/var/log/isolate-panel/panel.out.log
stdout_logfile_maxbytes=50MB
stdout_logfile_backups=3
stderr_logfile_maxbytes=10MB
stderr_logfile_backups=3

priority=10

[program:xray]
command=/app/data/cores/xray/xray -config /app/data/cores/xray/config.json
directory=/app/data/cores/xray
autostart=false
autorestart=true
stderr_logfile=/var/log/isolate-panel/xray.err.log
stdout_logfile=/var/log/isolate-panel/xray.out.log
stdout_logfile_maxbytes=50MB
stdout_logfile_backups=3
stderr_logfile_maxbytes=10MB
stderr_logfile_backups=3

priority=20
startsecs=5
startretries=3
stopwaitsecs=10
stopasgroup=true
killasgroup=true
exitcodes=0,2

[program:mihomo]
command=/app/data/cores/mihomo/mihomo -d /app/data/cores/mihomo -f /app/data/cores/mihomo/config.yaml
directory=/app/data/cores/mihomo
autostart=false
autorestart=true
stderr_logfile=/var/log/isolate-panel/mihomo.err.log
stdout_logfile=/var/log/isolate-panel/mihomo.out.log
stdout_logfile_maxbytes=50MB
stdout_logfile_backups=3
stderr_logfile_maxbytes=10MB
stderr_logfile_backups=3

priority=20
startsecs=5
startretries=3
stopwaitsecs=15
stopasgroup=true
killasgroup=true
exitcodes=0,2

[program:singbox]
command=/app/data/cores/singbox/sing-box run -c /app/data/cores/singbox/config.json
directory=/app/data/cores/singbox
autostart=false
autorestart=true
stderr_logfile=/var/log/isolate-panel/singbox.err.log
stdout_logfile=/var/log/isolate-panel/singbox.out.log
stdout_logfile_maxbytes=50MB
stdout_logfile_backups=3
stderr_logfile_maxbytes=10MB
stderr_logfile_backups=3

priority=20
startsecs=5
startretries=3
stopwaitsecs=15
stopasgroup=true
killasgroup=true
exitcodes=0,2

; ============================================================================
; Process Groups — Core Isolation
; ============================================================================

[group:xray]
programs=xray
priority=100

[group:mihomo]
programs=mihomo
priority=110

[group:singbox]
programs=singbox
priority=120
