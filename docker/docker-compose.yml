name: isolate-panel

services:
  isolate-panel:
    image: isolate-panel:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: isolate-panel
    restart: unless-stopped

    ports:
      - "127.0.0.1:8080:8080"
      - "443:443/tcp"
      - "443:443/udp"
      - "8443:8443/tcp"

    volumes:
      - ./data:/app/data
      - ./logs:/var/log/supervisor
      - ./logs/isolate-panel:/var/log/isolate-panel

    env_file:
      - .env

    environment:
      - PORT=8080
      - CONFIG_PATH=/app/configs/config.yaml
      - DATABASE_PATH=/app/data/isolate-panel.db
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - APP_ENV=${APP_ENV:-production}
      - JWT_SECRET=${JWT_SECRET:-}
      - TZ=${TZ:-UTC}
      - MONITORING_MODE=${MONITORING_MODE:-lite}

    security_opt:
      - no-new-privileges:true

    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - SYS_PTRACE
      - NET_ADMIN

    networks:
      - isolate-network

    healthcheck:
      test: ["CMD", "/docker-healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  isolate-network:
    driver: bridge
