global
    maxconn 4096
    log stdout local0
    daemon

defaults
    mode tcp
    timeout connect 5s
    timeout client 30s
    timeout server 30s
    option tcplog

frontend test_frontend
    bind *:443
    default_backend test_backend

backend test_backend
    balance roundrobin
    server xray 127.0.0.1:10001 check
    server singbox 127.0.0.1:11001 check
    server mihomo 127.0.0.1:12001 check

listen stats
    bind *:8404
    mode http
    stats enable
    stats uri /stats
    stats refresh 10s
    stats admin if TRUE
