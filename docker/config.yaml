# Isolate Panel Configuration
app:
  name: "Isolate Panel"
  env: "production"
  port: 8080
  host: "0.0.0.0"
  admin_email: "admin@example.com"
  panel_url: "" # Optional: override with APP_PANEL_URL env var for subscription links

database:
  path: /app/data/isolate-panel.db
  max_open_conns: 100
  max_idle_conns: 1

jwt:
  secret: ""  # REQUIRED: set via JWT_SECRET env var; app will refuse to start if empty
  access_token_ttl: 900       # 15 minutes
  refresh_token_ttl: 604800    # 7 days

logging:
  level: "info"
  format: "json"
  output: "stdout"
  file_path: "/app/logs/isolate-panel.log"
  max_size: 100
  max_backups: 3
  max_age: 30
  compress: true

security:
  argon2:
    time: 3
    memory: 65536
    threads: 4
    key_length: 32
    salt_length: 16

cores:
  config_dir: /app/data/cores
  supervisor_url: "http://localhost:9001"
  xray_api_addr: "127.0.0.1:10085"
  singbox_api_addr: "127.0.0.1:9090"
  mihomo_api_addr: "127.0.0.1:9091"
  singbox_api_key: ""  # Auto-generated: override via CORES_SINGBOX_API_KEY env var
  mihomo_api_key: ""   # Auto-generated: override via CORES_MIHOMO_API_KEY env var

subscription:
  enabled: true
  port: 443
  auto_tls: true
